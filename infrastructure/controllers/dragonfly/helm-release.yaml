apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: dragonfly-system
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: dragonfly-operator
      version: v1.5.0
      sourceRef:
        kind: HelmRepository
        name: dragonfly-operator
        namespace: flux-system
